<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <!-- SEO Meta -->
  <title>PDF Password Unlock Tool | Free Online PDF Unlocker</title>
  <meta name="description" content="Unlock password-protected PDF files instantly in your browser. No upload to server, secure and fast. Drag & drop support.">
  <meta name="keywords" content="PDF unlock, remove PDF password, free PDF tool, unlock PDF online, pdf-lib, browser PDF">
  <link rel="canonical" href="https://pdfunlock.tool">
  <!-- Font & Icons (Google Material Symbols) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f6f9fc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #0b1a2a;
    }

    .card {
      max-width: 640px;
      width: 100%;
      background: #ffffff;
      border-radius: 2.5rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.25), 0 8px 24px -6px rgba(0, 0, 0, 0.05);
      transition: box-shadow 0.2s;
    }

    h1 {
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    h1 span {
      background: #1a5cff;
      color: white;
      font-size: 1.4rem;
      padding: 0.1rem 0.6rem;
      border-radius: 60px;
      margin-left: 0.2rem;
    }

    .subhead {
      font-size: 0.95rem;
      color: #4a5c6e;
      margin-bottom: 2rem;
      border-left: 4px solid #1a5cff;
      padding-left: 1rem;
      background: #f0f5fe;
      border-radius: 0 12px 12px 0;
      line-height: 1.5;
    }

    .drop-zone {
      border: 2px dashed #d0dbe8;
      border-radius: 2rem;
      padding: 2.5rem 1.5rem;
      text-align: center;
      background: #fafcff;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
      cursor: pointer;
      position: relative;
      margin-bottom: 1.8rem;
    }

    .drop-zone.drag-over {
      border-color: #1a5cff;
      background: #eef4ff;
      transform: scale(1.01);
    }

    .drop-zone .icon {
      font-size: 3.6rem;
      color: #1a5cff;
      display: block;
      margin-bottom: 0.6rem;
    }

    .drop-zone p {
      font-weight: 500;
      color: #1e2e3f;
    }

    .drop-zone .browse {
      color: #1a5cff;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .drop-zone .hint {
      font-size: 0.85rem;
      color: #6b7d8f;
      margin-top: 0.5rem;
    }

    .file-name {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #f0f5fe;
      padding: 0.7rem 1.2rem;
      border-radius: 60px;
      font-size: 0.95rem;
      font-weight: 500;
      margin: 0.8rem 0 1.2rem 0;
      color: #0b1a2a;
      word-break: break-all;
    }

    .file-name .material-symbols-outlined {
      color: #1a5cff;
    }

    .file-name .remove-file {
      margin-left: auto;
      background: none;
      border: none;
      color: #8f9eb0;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .file-name .remove-file:hover {
      color: #d03a3a;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin: 1.5rem 0 1.8rem;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .password-wrapper {
      display: flex;
      background: white;
      border: 1.5px solid #dce4ec;
      border-radius: 60px;
      padding: 0.1rem 0.1rem 0.1rem 1.2rem;
      transition: border 0.2s, box-shadow 0.2s;
      align-items: center;
    }

    .password-wrapper:focus-within {
      border-color: #1a5cff;
      box-shadow: 0 0 0 4px rgba(26, 92, 255, 0.15);
    }

    .password-wrapper input {
      border: none;
      padding: 0.9rem 0.2rem;
      font-size: 1rem;
      width: 100%;
      background: transparent;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    .password-wrapper input::placeholder {
      color: #a8b8c9;
    }

    .password-wrapper button {
      background: #1a5cff;
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }

    .password-wrapper button:hover {
      background: #0f4ad0;
    }

    .password-wrapper button:active {
      transform: scale(0.96);
    }

    .password-wrapper button:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .status {
      margin: 1.2rem 0 0.2rem;
      padding: 0.8rem 1rem;
      border-radius: 60px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #f0f5fe;
      color: #0b1a2a;
      min-height: 3.4rem;
    }

    .status.error {
      background: #fee9e9;
      color: #b33a3a;
    }

    .status.success {
      background: #e2f3e4;
      color: #1d6f2c;
    }

    .status .material-symbols-outlined {
      font-size: 1.4rem;
    }

    .footer-note {
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: #6b7d8f;
      text-align: center;
      border-top: 1px solid #ecf1f7;
      padding-top: 1.5rem;
    }

    .footer-note a {
      color: #1a5cff;
      text-decoration: none;
    }

    /* hidden file input */
    #fileInput {
      display: none;
    }

    /* responsive */
    @media (max-width: 480px) {
      .card {
        padding: 1.8rem 1.2rem;
        border-radius: 2rem;
      }
      h1 {
        font-size: 1.7rem;
        flex-wrap: wrap;
      }
      .password-wrapper {
        flex-wrap: wrap;
        background: transparent;
        border: none;
        padding: 0;
        box-shadow: none;
        gap: 0.6rem;
      }
      .password-wrapper input {
        border: 1.5px solid #dce4ec;
        border-radius: 60px;
        padding: 0.8rem 1.2rem;
        background: white;
      }
      .password-wrapper input:focus {
        box-shadow: 0 0 0 4px rgba(26, 92, 255, 0.15);
        border-color: #1a5cff;
      }
      .password-wrapper button {
        width: 100%;
        justify-content: center;
        padding: 0.8rem;
      }
      .drop-zone {
        padding: 2rem 1rem;
      }
    }
  </style>
</head>
<body>

<div class="card" role="main">
  <h1>
    🔓 PDF Unlock
    <span>Tool</span>
  </h1>
  <div class="subhead">
    Remove password from encrypted PDFs — everything stays in your browser.
  </div>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Drop or click to upload PDF">
    <span class="material-symbols-outlined icon">upload_file</span>
    <p><span class="browse">Click to browse</span> or drag &amp; drop your PDF</p>
    <div class="hint">Supports encrypted PDF files (.pdf)</div>
  </div>

  <!-- hidden file input -->
  <input type="file" id="fileInput" accept=".pdf,application/pdf">

  <!-- File name + remove -->
  <div id="fileInfo" class="file-name" style="display: none;">
    <span class="material-symbols-outlined">description</span>
    <span id="fileNameDisplay">file.pdf</span>
    <button class="remove-file" id="removeFileBtn" aria-label="Remove file">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>

  <!-- Password input -->
  <div class="input-group">
    <label for="passwordInput">
      <span class="material-symbols-outlined" style="font-size:1.2rem;">lock</span> PDF password
    </label>
    <div class="password-wrapper">
      <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password">
      <button id="unlockBtn">Unlock PDF</button>
    </div>
  </div>

  <!-- Status message -->
  <div id="statusMessage" class="status">
    <span class="material-symbols-outlined">info</span>
    <span id="statusText">Ready to unlock</span>
  </div>

  <div class="footer-note">
    ⚡ Powered by <strong>pdf-lib</strong> · No file upload · 100% client-side
  </div>
</div>

<!-- pdf-lib from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script>
  (function() {
    "use strict";

    // ----- DOM refs -----
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const removeFileBtn = document.getElementById('removeFileBtn');
    const passwordInput = document.getElementById('passwordInput');
    const unlockBtn = document.getElementById('unlockBtn');
    const statusMessage = document.getElementById('statusMessage');
    const statusText = document.getElementById('statusText');

    // ----- state -----
    let currentFile = null;        // File object
    let isProcessing = false;

    // ----- helpers -----
    function setStatus(message, type = 'info') {
      statusText.textContent = message;
      statusMessage.className = 'status';
      if (type === 'error') {
        statusMessage.classList.add('error');
        statusMessage.querySelector('.material-symbols-outlined').textContent = 'error';
      } else if (type === 'success') {
        statusMessage.classList.add('success');
        statusMessage.querySelector('.material-symbols-outlined').textContent = 'check_circle';
      } else {
        // info
        statusMessage.querySelector('.material-symbols-outlined').textContent = 'info';
      }
    }

    function resetStatus() {
      setStatus('Ready to unlock', 'info');
    }

    function showFile(file) {
      if (!file) {
        fileInfo.style.display = 'none';
        return;
      }
      fileNameDisplay.textContent = file.name;
      fileInfo.style.display = 'flex';
    }

    function clearFile() {
      currentFile = null;
      fileInput.value = '';
      showFile(null);
      resetStatus();
      passwordInput.value = '';
    }

    // ----- handle file selection -----
    function handleFile(file) {
      if (!file) return;
      // validate PDF
      if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
        setStatus('Please select a valid PDF file.', 'error');
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        setStatus('File too large (max 50 MB).', 'error');
        return;
      }
      currentFile = file;
      showFile(file);
      resetStatus();
      passwordInput.value = '';
      passwordInput.focus();
    }

    // ----- unlock logic using pdf-lib -----
    async function unlockPdf(file, password) {
      const arrayBuffer = await file.arrayBuffer();

      let pdfDoc;
      try {
        // Try to load with password
        pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { password });
      } catch (err) {
        // If error includes "Invalid password" or similar
        if (err.message && (err.message.includes('password') || err.message.includes('encrypted'))) {
          throw new Error('Incorrect password. Please try again.');
        } else {
          throw new Error('Failed to load PDF. It may be corrupted or not password-protected.');
        }
      }

      // If loaded, document is decrypted. Remove encryption by saving without password
      const pdfBytes = await pdfDoc.save();

      // Create a new Blob & download
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      // remove '-locked' from filename if present, else append '-unlocked'
      let baseName = file.name.replace(/\.pdf$/i, '');
      const unlockedName = `${baseName}-unlocked.pdf`;
      link.download = unlockedName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      return true;
    }

    // ----- main unlock action -----
    async function handleUnlock() {
      if (isProcessing) return;

      if (!currentFile) {
        setStatus('Please select a PDF file first.', 'error');
        return;
      }

      const password = passwordInput.value.trim();
      if (password === '') {
        setStatus('Please enter the PDF password.', 'error');
        return;
      }

      // start
      isProcessing = true;
      unlockBtn.disabled = true;
      setStatus('Unlocking... please wait.', 'info');
      statusMessage.querySelector('.material-symbols-outlined').textContent = 'hourglass_top';

      try {
        await unlockPdf(currentFile, password);
        setStatus('✅ PDF unlocked successfully! Download started.', 'success');
        // after success, keep file but clear password field for security
        passwordInput.value = '';
        // we keep file loaded so user can re-unlock with different password if needed
      } catch (err) {
        setStatus(`❌ ${err.message || 'Unlock failed.'}`, 'error');
      } finally {
        isProcessing = false;
        unlockBtn.disabled = false;
        if (statusMessage.classList.contains('success')) {
          // keep success
        } else if (statusMessage.classList.contains('error')) {
          // keep error
        } else {
          resetStatus();
        }
      }
    }

    // ----- event listeners -----

    // 1. Click on drop zone -> trigger file input
    dropZone.addEventListener('click', (e) => {
      if (e.target.closest('.remove-file')) return;
      fileInput.click();
    });

    // 2. Drag and drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleFile(files[0]);
      }
    });

    // 3. File input change
    fileInput.addEventListener('change', (e) => {
      if (fileInput.files.length > 0) {
        handleFile(fileInput.files[0]);
      }
    });

    // 4. Remove file button
    removeFileBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      clearFile();
      setStatus('File removed.', 'info');
    });

    // 5. Unlock button
    unlockBtn.addEventListener('click', handleUnlock);

    // 6. Enter key in password field
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleUnlock();
      }
    });

    // 7. Extra: if user clicks on file info (remove btn prevented)
    fileInfo.addEventListener('click', (e) => {
      // if click on file info but not on remove button, we could re-trigger upload? no, just focus password
      if (!e.target.closest('.remove-file')) {
        passwordInput.focus();
      }
    });

    // 8. Accessibility: drop zone can be activated with keyboard (Enter/Space)
    dropZone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });

    // 9. Reset status on any interaction that clears error (optional)
    passwordInput.addEventListener('focus', () => {
      if (statusMessage.classList.contains('error')) {
        resetStatus();
      }
    });

    // 10. init status
    resetStatus();

    // 11. if user drags file over document body (prevent default)
    document.addEventListener('dragover', (e) => e.preventDefault());
    document.addEventListener('drop', (e) => e.preventDefault());

  })();
</script>
</body>
</html>
